<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Court Display — Ballantyne CC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0B1B2B;--navy-mid:#0F2338;--navy-card:#1A3350;
    --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.18);--gold-light:rgba(201,168,76,0.65);
    --white:#F5F0E8;--white-dim:rgba(245,240,232,0.55);--white-faint:rgba(245,240,232,0.16);
    --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.15);--blue-glow:rgba(59,130,246,0.3);
    --green:#3A7D52;--green-dim:rgba(58,125,82,0.18);
    --red:#C0392B;--red-dim:rgba(192,57,43,0.18);
    --separator:rgba(201,168,76,0.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);width:1920px;height:1080px;overflow:hidden;color:var(--white);}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.45;}

  .wrapper{display:grid;grid-template-rows:90px 1fr 58px;height:1080px;}

  header{background:var(--navy-mid);border-bottom:1px solid var(--separator);display:flex;align-items:center;justify-content:space-between;padding:0 48px;position:relative;}
  header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),rgba(59,130,246,.8),var(--gold),transparent);opacity:0.6;}
  .header-left{display:flex;align-items:center;gap:20px;}
  .crest{width:54px;height:54px;border:1.5px solid rgba(201,168,76,.4);border-radius:50%;background:var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:24px;}
  .club-name{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--white);font-weight:600;letter-spacing:.5px;}
  .club-sub{font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
  .header-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
  .display-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:3px;}
  .display-title{font-family:'Cormorant Garamond',serif;font-size:24px;color:var(--white);font-weight:500;}
  .header-right{display:flex;align-items:center;gap:28px;}
  .stats-row{display:flex;gap:20px;}
  .stat{text-align:center;background:var(--navy-card);border:1px solid var(--separator);border-radius:6px;padding:8px 16px;min-width:72px;}
  .stat-val{font-family:'DM Mono',monospace;font-size:22px;color:var(--white);line-height:1;}
  .stat-val.available{color:var(--green);}
  .stat-val.booked{color:var(--blue);}
  .stat-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--white-dim);margin-top:3px;}
  .time-block{border-left:1px solid var(--separator);padding-left:24px;text-align:right;}
  .live-time{font-family:'DM Mono',monospace;font-size:32px;color:var(--white);letter-spacing:2px;line-height:1;}
  .live-date{font-size:11px;color:var(--white-dim);letter-spacing:.5px;margin-top:3px;}

  /* 4-court big card layout */
  .courts-area{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:16px;padding:24px 44px;overflow:hidden;}

  .court-card{background:rgba(15,35,56,0.8);border:1px solid rgba(59,130,246,0.2);border-radius:14px;padding:32px 40px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;transition:border-color .3s;}
  .court-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--blue),rgba(59,130,246,.3));opacity:.6;}
  .court-card.is-booked{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.06);}
  .court-card.is-clinic{border-color:rgba(140,100,240,.4);background:rgba(140,100,240,.06);}
  .court-card.is-clinic::before{background:linear-gradient(90deg,rgba(140,100,240,1),rgba(140,100,240,.3));}
  .court-card.is-available{border-color:rgba(58,125,82,.3);background:rgba(58,125,82,.04);}
  .court-card.is-available::before{background:linear-gradient(90deg,var(--green),rgba(58,125,82,.3));}

  .court-top{display:flex;align-items:flex-start;justify-content:space-between;}
  .court-id{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--gold);font-weight:600;letter-spacing:2px;text-transform:uppercase;}
  .court-surface-tag{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--white-dim);background:rgba(255,255,255,.06);padding:4px 10px;border-radius:3px;border:1px solid rgba(255,255,255,.08);}

  .court-status-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 0;}

  /* Available state */
  .available-label{font-family:'Cormorant Garamond',serif;font-size:64px;color:var(--green);font-weight:600;line-height:1;letter-spacing:-1px;}
  .available-sub{font-size:14px;color:var(--white-dim);margin-top:8px;letter-spacing:1px;}
  .qr-note{display:flex;align-items:center;gap:10px;margin-top:16px;font-size:13px;color:rgba(58,125,82,.8);}

  /* Booked state */
  .booked-players{font-family:'Cormorant Garamond',serif;font-size:52px;color:var(--white);font-weight:600;line-height:1.1;letter-spacing:-0.5px;}
  .booked-time{font-family:'DM Mono',monospace;font-size:18px;color:var(--blue);margin-top:10px;letter-spacing:2px;}
  .booked-notes{font-size:13px;color:var(--white-dim);margin-top:6px;font-style:italic;}

  /* Clinic state */
  .clinic-name{font-family:'Cormorant Garamond',serif;font-size:52px;color:rgba(180,150,255,1);font-weight:600;line-height:1.1;}
  .clinic-time{font-family:'DM Mono',monospace;font-size:18px;color:rgba(180,150,255,.7);margin-top:10px;letter-spacing:2px;}
  .clinic-notes{font-size:13px;color:rgba(180,150,255,.6);margin-top:6px;}

  .court-bottom{display:flex;align-items:center;justify-content:space-between;}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:5px 14px;border-radius:20px;}
  .pill-available{background:rgba(58,125,82,.2);color:#6FCF97;border:1px solid rgba(58,125,82,.35);}
  .pill-booked{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
  .pill-clinic{background:rgba(140,100,240,.15);color:rgba(180,150,255,.9);border:1px solid rgba(140,100,240,.3);}
  .pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:pulse 1.4s ease infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}

  footer{background:var(--navy-mid);border-top:1px solid var(--separator);display:flex;align-items:center;justify-content:space-between;padding:0 48px;position:relative;}
  footer::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.35;}
  .footer-legend{display:flex;gap:20px;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--white-dim);}
  .legend-dot{width:10px;height:10px;border-radius:2px;}
  .dot-available{background:var(--green);}
  .dot-booked{background:var(--blue);}
  .dot-clinic{background:rgba(140,110,240,.9);}
  .footer-reserve{font-size:13px;color:var(--white-dim);text-align:center;}
  .footer-reserve strong{color:var(--gold);}
  .footer-brand{font-size:11px;color:rgba(245,240,232,.25);letter-spacing:1px;text-align:right;}
  .footer-brand span{color:var(--gold);font-weight:600;}

  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .court-card{animation:fadeIn .5s ease both;}
  .court-card:nth-child(1){animation-delay:.1s;}
  .court-card:nth-child(2){animation-delay:.15s;}
  .court-card:nth-child(3){animation-delay:.2s;}
  .court-card:nth-child(4){animation-delay:.25s;}
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-left">
      <div class="crest">🏓</div>
      <div>
        <div class="club-name">Ballantyne Country Club</div>
        <div class="club-sub">Pickleball Complex — Court Availability</div>
      </div>
    </div>
    <div class="header-center">
      <div class="display-label">Today's Schedule</div>
      <div class="display-title" id="headerDate">—</div>
    </div>
    <div class="header-right">
      <div class="stats-row">
        <div class="stat"><div class="stat-val available" id="availCount">—</div><div class="stat-label">Available</div></div>
        <div class="stat"><div class="stat-val booked"    id="bookedCount">—</div><div class="stat-label">Reserved</div></div>
      </div>
      <div class="time-block">
        <div class="live-time" id="clock">—</div>
        <div class="live-date" id="clockDate">—</div>
      </div>
    </div>
  </header>

  <div class="courts-area" id="courtsArea">
    <!-- Populated by JS -->
  </div>

  <footer>
    <div class="footer-legend">
      <div class="legend-item"><div class="legend-dot dot-available"></div>Available</div>
      <div class="legend-item"><div class="legend-dot dot-booked"></div>Reserved</div>
      <div class="legend-item"><div class="legend-dot dot-clinic"></div>Clinic / Event</div>
    </div>
    <div class="footer-reserve">Reserve a court: <strong>Pro Shop ext. 103</strong> · Walk-on available when courts show Available</div>
    <div class="footer-brand">Powered by <span>ClubOS</span></div>
  </footer>
</div>

<script>
const SUPABASE_URL = 'https://ykfvwqewnfnibpzytspn.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZnZ3cWV3bmZuaWJwenl0c3BuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDUxNzUzMDQsImV4cCI6MjA2MDc1MTMwNH0.gE3vvqSxFd_oCpalOoRhgzDgSdlkZ8AqRMOkSjFWzN4';
const CLUB_ID = 'b652375e-952e-4675-94a6-cbca9cd3a6f8';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function todayStr(){ return new Date().toISOString().split('T')[0]; }
function nowStr(){ const n=new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; }
function fmtTime(t){ if(!t) return ''; const [h,m]=t.split(':'); const hr=parseInt(h); return `${hr%12||12}:${m} ${hr>=12?'PM':'AM'}`; }

function renderCourts(reservations){
  const now  = nowStr();
  const area = document.getElementById('courtsArea');

  const courts = [1,2,3,4].map(num => {
    const active = reservations.find(r =>
      r.court_number===num && r.start_time<=now+':59' && r.end_time>now
    );
    return {num, active};
  });

  const occupied  = courts.filter(c=>c.active).length;
  document.getElementById('availCount').textContent  = 4 - occupied;
  document.getElementById('bookedCount').textContent = occupied;

  area.innerHTML = courts.map(({num, active}) => {
    let cardClass, statusPill, content;

    if(!active){
      cardClass  = 'is-available';
      statusPill = `<div class="status-pill pill-available"><div class="pill-dot"></div>Available</div>`;
      content    = `<div class="available-label">Available</div>
        <div class="available-sub">Walk-on welcome · Scan to reserve</div>`;
    } else if(active.display_type==='clinic'){
      cardClass  = 'is-clinic';
      statusPill = `<div class="status-pill pill-clinic"><div class="pill-dot"></div>Clinic</div>`;
      content    = `<div class="clinic-name">${active.member_name}</div>
        <div class="clinic-time">${fmtTime(active.start_time)} – ${fmtTime(active.end_time)}</div>
        ${active.notes?`<div class="clinic-notes">${active.notes}</div>`:''}`;
    } else {
      cardClass  = 'is-booked';
      statusPill = `<div class="status-pill pill-booked"><div class="pill-dot"></div>Reserved</div>`;
      content    = `<div class="booked-players">${active.member_name}</div>
        <div class="booked-time">${fmtTime(active.start_time)} – ${fmtTime(active.end_time)}</div>
        ${active.notes?`<div class="booked-notes">${active.notes}</div>`:''}`;
    }

    return `<div class="court-card ${cardClass}">
      <div class="court-top">
        <div class="court-id">Pickleball · Court ${num}</div>
        <div class="court-surface-tag">Indoor</div>
      </div>
      <div class="court-status-wrap">${content}</div>
      <div class="court-bottom">${statusPill}</div>
    </div>`;
  }).join('');
}

async function loadData(){
  const {data} = await sb.from('court_reservations').select('*')
    .eq('club_id',CLUB_ID).eq('reservation_date',todayStr())
    .eq('sport','pickleball').neq('status','cancelled').order('start_time');
  if(data) renderCourts(data);
}

function updateClock(){
  const now = new Date();
  const h=now.getHours(), m=String(now.getMinutes()).padStart(2,'0');
  const ampm=h>=12?'PM':'AM';
  document.getElementById('clock').textContent = `${h%12||12}:${m} ${ampm}`;
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const ds=`${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
  document.getElementById('clockDate').textContent = ds;
  document.getElementById('headerDate').textContent = ds;
}

sb.channel('pb-display')
  .on('postgres_changes',{event:'*',schema:'public',table:'court_reservations',filter:`club_id=eq.${CLUB_ID}`},()=>loadData())
  .subscribe();

updateClock(); setInterval(updateClock,1000);
loadData(); setInterval(loadData,30000);
</script>
</body>
</html>
